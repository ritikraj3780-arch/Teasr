<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEVA SETTU - Premium Payment Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0a0a0a);
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Global Gold Accent */
        .gold-text {
            color: #FFD700; /* Gold */
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Keyframe Animations */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 215, 0, 0); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Background Animation Container */
        .background-animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 70%);
            animation: gradientShift 20s ease infinite;
            background-size: 200% 200%;
        }

        /* Main Content Wrapper */
        .main-content-wrapper {
            max-width: 900px;
            width: 90%;
            margin: 40px auto;
            padding: 30px;
            background: rgba(10, 10, 10, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), 0 0 100px rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            animation: fadeIn 1.5s ease-out forwards;
            position: relative;
            z-index: 1;
        }

        /* Header Section */
        .hero-section {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.7), 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite alternate;
            position: relative;
            z-index: 2;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid transparent;
            border-radius: 50%;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: spin 10s linear infinite;
            z-index: 1;
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5em;
            color: #FFD700;
            margin: 10px 0;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #FFD700, #FFA500, #FFD700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s linear infinite;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        .tagline {
            font-size: 1.2em;
            color: #cccccc;
            font-style: italic;
            margin-top: 10px;
            animation: fadeIn 2s ease-out forwards 0.5s;
        }

        /* Section Titles */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2em;
            color: #FFD700;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            border-radius: 5px;
        }

        /* Payment Section */
        .payment-section {
            margin-bottom: 60px;
            text-align: center;
        }

        .amount-selection {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .amount-box {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px 25px;
            font-size: 1.5em;
            font-family: 'Orbitron', sans-serif;
            color: #FFD700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .amount-box:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .amount-box.selected {
            background: #FFD700;
            color: #1a1a1a;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            border-color: #FFA500;
        }

        .donate-button {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #1a1a1a;
            border: none;
            padding: 18px 40px;
            font-size: 1.8em;
            font-family: 'Orbitron', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.7);
            position: relative;
            overflow: hidden;
            z-index: 1;
            margin-top: 20px;
        }

        .donate-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: width 0.6s ease, height 0.6s ease, top 0.6s ease, left 0.6s ease;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .donate-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .donate-button:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.9);
        }

        .trust-indicators {
            margin-top: 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            font-size: 0.9em;
            color: #aaaaaa;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.05);
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .trust-item img {
            height: 30px;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }

        /* Impact Section */
        .impact-section {
            margin-bottom: 60px;
        }

        .impact-counters {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 30px;
            text-align: center;
        }

        .counter-item {
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 25px 30px;
            flex: 1;
            min-width: 200px;
            max-width: 280px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .counter-item:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
        }

        .counter-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            color: #FFD700;
            display: block;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
        }

        .counter-label {
            font-size: 1.1em;
            color: #e0e0e0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Footer */
        .footer-section {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.1);
            color: #888888;
            font-size: 0.9em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-content-wrapper {
                width: 95%;
                padding: 20px;
                margin: 20px auto;
            }

            .brand-name {
                font-size: 2.5em;
            }

            .tagline {
                font-size: 1em;
            }

            .section-title {
                font-size: 1.8em;
            }

            .amount-box {
                flex-basis: 45%;
                font-size: 1.2em;
            }

            .donate-button {
                font-size: 1.5em;
                padding: 15px 30px;
            }

            .impact-counters {
                flex-direction: column;
                align-items: center;
            }

            .counter-item {
                width: 90%;
                max-width: none;
            }

            .counter-value {
                font-size: 2.5em;
            }
        }

        @media (max-width: 480px) {
            .logo {
                width: 100px;
                height: 100px;
            }

            .brand-name {
                font-size: 2em;
            }

            .tagline {
                font-size: 0.9em;
            }

            .section-title {
                font-size: 1.5em;
            }

            .amount-box {
                flex-basis: 100%;
                font-size: 1.1em;
            }

            .donate-button {
                font-size: 1.3em;
                padding: 12px 25px;
            }

            .trust-item {
                flex-direction: column;
                text-align: center;
                padding: 10px;
            }

            .trust-item img {
                margin-bottom: 5px;
            }

            .counter-value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation-container">
        <!-- Particle effects, floating orbs, etc. will be generated here by JS -->
    </div>
    <div class="main-content-wrapper">
        <header class="hero-section">
            <div class="logo-container">
                <img src="seva-settu-logo.jpg" alt="SEVA SETTU Logo" class="logo">
            </div>
            <h1 class="brand-name">SEVA SETTU</h1>
            <p class="tagline">Bridging Lives Through Service</p>
        </header>

        <section class="payment-section">
            <h2 class="section-title">Make a Difference Today</h2>
            <div class="amount-selection">
                <div class="amount-box" data-amount="100">₹100</div>
                <div class="amount-box" data-amount="500">₹500</div>
                <div class="amount-box" data-amount="1000">₹1000</div>
                <div class="amount-box" data-amount="2000">₹2000</div>
                <div class="amount-box" data-amount="5000">₹5000</div>
                <div class="amount-box" data-amount="10000">₹10000</div>
            </div>
            <button class="donate-button">Donate Now</button>
            <div class="trust-indicators">
                <div class="trust-item">
                    <img src="https://razorpay.com/assets/razorpay-logo.svg" alt="Razorpay Logo" style="height: 25px;">
                    <span>Razorpay Verified</span>
                </div>
                <div class="trust-item">
                    <img src="https://img.icons8.com/ios-filled/50/FFD700/lock.png" alt="Security Lock" style="height: 25px;">
                    <span>100% Secure</span>
                </div>
                <div class="trust-item">
                    <img src="https://img.icons8.com/ios-filled/50/FFD700/shield.png" alt="Security Shield" style="height: 25px;">
                    <span>Powered by Razorpay</span>
                </div>
            </div>
        </section>

        <section class="impact-section">
            <h2 class="section-title">Our Impact</h2>
            <div class="impact-counters">
                <div class="counter-item">
                    <span class="counter-value">5000+</span>
                    <span class="counter-label">Lives Touched</span>
                </div>
                <div class="counter-item">
                    <span class="counter-value">50+</span>
                    <span class="counter-label">Projects</span>
                </div>
                <div class="counter-item">
                    <span class="counter-value">200+</span>
                    <span class="counter-label">Volunteers</span>
                </div>
            </div>
        </section>

        <footer class="footer-section">
            <p>&copy; 2026 SEVA SETTU Foundation. All rights reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Particle Effects (Floating Orbs)
            const bgContainer = document.querySelector(".background-animation-container");
            const numParticles = 50;

            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement("div");
                particle.classList.add("particle");
                bgContainer.appendChild(particle);

                const size = Math.random() * 10 + 5; // Size between 5px and 15px
                const duration = Math.random() * 20 + 10; // Duration between 10s and 30s
                const delay = Math.random() * 10; // Delay up to 10s

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animation = `float ${duration}s infinite alternate ease-in-out ${delay}s`;
                particle.style.opacity = Math.random() * 0.5 + 0.2; // Opacity between 0.2 and 0.7
                particle.style.background = `radial-gradient(circle at center, rgba(255, 215, 0, ${Math.random() * 0.5 + 0.5}) 0%, transparent 70%)`;
                particle.style.boxShadow = `0 0 ${size / 2}px rgba(255, 215, 0, 0.7)`;
            }

            // Keyframe for floating particles
            const styleSheet = document.styleSheets[0];
            styleSheet.insertRule(`
                @keyframes float {
                    0% { transform: translateY(0) translateX(0) scale(1); }
                    50% { transform: translateY(calc(var(--float-y) * 1px)) translateX(calc(var(--float-x) * 1px)) scale(1.1); }
                    100% { transform: translateY(0) translateX(0) scale(1); }
                }
            `, styleSheet.cssRules.length);

            document.querySelectorAll(".particle").forEach(particle => {
                particle.style.setProperty("--float-y", (Math.random() - 0.5) * 100);
                particle.style.setProperty("--float-x", (Math.random() - 0.5) * 100);
            });

            // Amount Selection Logic
            const amountBoxes = document.querySelectorAll(".amount-box");
            amountBoxes.forEach(box => {
                box.addEventListener("click", () => {
                    amountBoxes.forEach(b => b.classList.remove("selected"));
                    box.classList.add("selected");
                });
            });

            // Donate Button Redirection
            const donateButton = document.querySelector(".donate-button");
            donateButton.addEventListener("click", () => {
                window.location.href = "https://razorpay.me/@SEVASETTU";
            });

            // Impact Counters Animation
            const impactCounters = document.querySelectorAll(".counter-value");
            const animateCounter = (obj, start, end, duration) => {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    obj.innerHTML = Math.floor(progress * (end - start) + start) + "+";
                    if (progress < 1) {
                        window.requestAnimationFrame(step);
                    }
                };
                window.requestAnimationFrame(step);
            };

            const observerOptions = {
                root: null,
                rootMargin: "0px",
                threshold: 0.5 // Trigger when 50% of the element is visible
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const target = entry.target;
                        const endValue = parseInt(target.textContent.replace("+", ""));
                        animateCounter(target, 0, endValue, 2000); // Animate over 2 seconds
                        observer.unobserve(target); // Stop observing once animated
                    }
                });
            }, observerOptions);

            impactCounters.forEach(counter => {
                observer.observe(counter);
            });

            // Amount Selection Logic (already present, just ensuring it works with hardcoded elements)
            const amountBoxes = document.querySelectorAll(".amount-box");
            amountBoxes.forEach(box => {
                box.addEventListener("click", () => {
                    amountBoxes.forEach(b => b.classList.remove("selected"));
                    box.classList.add("selected");
                });
            });
        });
    </script>
</body>
</html>
