<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seva Settu — Bridging Lives Through Service</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a853;
            --gold-light: #f0d78c;
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --accent: #1a73e8;
            --white: #ffffff;
            --gray: #8a8a9a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }

        .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1a73e8 0%, transparent 70%);
            bottom: -200px;
            right: -200px;
            animation-delay: -7s;
        }

        .orb:nth-child(3) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6c3baa 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(30px, 50px) scale(1.05); }
        }

        /* Particle Effect */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            animation: rise 8s infinite ease-in;
            opacity: 0;
        }

        @keyframes rise {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .logo-glow {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: conic-gradient(var(--gold), var(--accent), var(--gold));
            animation: spin 4s linear infinite;
            opacity: 0.7;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-img {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--dark);
            z-index: 2;
        }

        .org-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            animation: shimmer 3s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .tagline {
            font-size: 0.9rem;
            color: var(--gray);
            margin-top: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            animation: fadeIn 1.5s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Verified Badge */
        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(26, 115, 232, 0.15);
            border: 1px solid rgba(26, 115, 232, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 0.75rem;
            color: #7ab8ff;
            animation: fadeIn 1.5s ease-out 0.8s both;
        }

        .verified-badge svg {
            width: 14px;
            height: 14px;
            fill: #1a73e8;
        }

        /* Payment Card */
        .payment-card {
            width: 100%;
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 168, 83, 0.2);
            border-radius: 24px;
            padding: 35px 25px;
            margin-top: 20px;
            animation: slideUp 1s ease-out 0.3s both;
            position: relative;
            overflow: hidden;
        }

        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
            color: var(--white);
        }

        /* Amount Buttons */
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .amount-btn {
            padding: 14px 10px;
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 12px;
            background: rgba(212, 168, 83, 0.05);
            color: var(--white);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .amount-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(212, 168, 83, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .amount-btn:hover::before {
            width: 200px;
            height: 200px;
        }

        .amount-btn:hover, .amount-btn.active {
            border-color: var(--gold);
            background: rgba(212, 168, 83, 0.15);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(212, 168, 83, 0.2);
        }

        .amount-btn.active {
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.3), rgba(212, 168, 83, 0.1));
        }

        /* Custom Amount */
        .custom-amount {
            position: relative;
            margin-bottom: 25px;
        }

        .custom-amount input {
            width: 100%;
            padding: 16px 20px 16px 35px;
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--white);
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .custom-amount input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 168, 83, 0.15);
        }

        .custom-amount .rupee-symbol {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .custom-amount input::placeholder {
            color: var(--gray);
            font-weight: 300;
        }

        /* Pay Button */
        .pay-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: var(--dark);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .pay-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        .pay-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(212, 168, 83, 0.4);
        }

        .pay-btn:active {
            transform: translateY(0);
        }

        /* Trust Section */
        .trust-section {
            margin-top: 25px;
            text-align: center;
            animation: fadeIn 1.5s ease-out 1s both;
        }

        .trust-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .trust-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            color: var(--gray);
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
        }

        .trust-item svg {
            width: 12px;
            height: 12px;
            fill: #4caf50;
        }

        .powered-by {
            font-size: 0.7rem;
            color: var(--gray);
            margin-top: 15px;
            opacity: 0.6;
        }

        /* Impact Counter */
        .impact-section {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
            animation: fadeIn 1.5s ease-out 1.2s both;
        }

        .impact-item {
            text-align: center;
        }

        .impact-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
        }

        .impact-label {
            font-size: 0.65rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Pulse animation for logo */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--gold);
            transform: translate(-50%, -50%);
            animation: pulse 2s infinite;
            opacity: 0;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* Success Animation */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .success-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .success-checkmark svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .success-text {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--white);
        }

        .success-subtext {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--gray);
        }

        /* Responsive */
        @media (max-width: 400px) {
            .container { padding: 20px 15px; }
            .org-name { font-size: 1.8rem; }
            .amount-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .amount-btn { padding: 12px 8px; font-size: 0.9rem; }
            .payment-card { padding: 25px 18px; }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-checkmark">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </div>
        <p class="success-text">Thank You! 🙏</p>
        <p class="success-subtext">Your contribution makes a difference</p>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <div class="pulse-ring"></div>
                <img src="seva-settu-logo.jpg" alt="Seva Settu" class="logo-img">
            </div>
            <h1 class="org-name">SEVA SETTU</h1>
            <p class="tagline">Bridging Lives Through Service</p>
            <div class="verified-badge">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <span>Razorpay Verified</span>
            </div>
        </div>

        <!-- Impact Counter -->
        <div class="impact-section">
            <div class="impact-item">
                <div class="impact-number" id="counter1">500+</div>
                <div class="impact-label">Lives Touched</div>
            </div>
            <div class="impact-item">
                <div class="impact-number" id="counter2">50+</div>
                <div class="impact-label">Projects</div>
            </div>
            <div class="impact-item">
                <div class="impact-number" id="counter3">100+</div>
                <div class="impact-label">Volunteers</div>
            </div>
        </div>

        <!-- Payment Card -->
        <div class="payment-card">
            <h2 class="card-title">Support Our Mission</h2>

            <!-- Amount Grid -->
            <div class="amount-grid">
                <button class="amount-btn" data-amount="100">₹100</button>
                <button class="amount-btn" data-amount="500">₹500</button>
                <button class="amount-btn" data-amount="1000" >₹1,000</button>
                <button class="amount-btn" data-amount="2000">₹2,000</button>
                <button class="amount-btn" data-amount="5000">₹5,000</button>
                <button class="amount-btn" data-amount="10000">₹10,000</button>
            </div>

            <!-- Custom Amount -->
            <div class="custom-amount">
                <span class="rupee-symbol">₹</span>
                <input type="number" id="customAmount" placeholder="Enter custom amount" min="1">
            </div>

            <!-- Pay Button -->
            <button class="pay-btn" id="payBtn" onclick="initiatePayment()">
                Donate Now ❤️
            </button>

            <!-- Trust Section -->
            <div class="trust-section">
                <div class="trust-icons">
                    <div class="trust-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <span>100% Secure</span>
                    </div>
                    <div class="trust-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <span>UPI / Cards / NetBanking</span>
                    </div>
                    <div class="trust-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <span>Instant Receipt</span>
                    </div>
                </div>
                <p class="powered-by">Powered by Razorpay • 256-bit SSL Encrypted</p>
            </div>
        </div>
    </div>

    <script>
        // Generate Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
            particle.style.width = (Math.random() * 3 + 1) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Amount Button Selection
        let selectedAmount = 0;
        const amountBtns = document.querySelectorAll('.amount-btn');
        const customInput = document.getElementById('customAmount');

        amountBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                amountBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedAmount = parseInt(this.dataset.amount);
                customInput.value = '';
            });
        });

        customInput.addEventListener('input', function() {
            amountBtns.forEach(b => b.classList.remove('active'));
            selectedAmount = parseInt(this.value) || 0;
        });

        // Razorpay Payment
        function initiatePayment() {
            const amount = selectedAmount || parseInt(customInput.value);
            
            if (!amount || amount < 1) {
                // Shake animation on button
                const btn = document.getElementById('payBtn');
                btn.style.animation = 'shake 0.5s ease';
                setTimeout(() => btn.style.animation = '', 500);
                alert('Please select or enter an amount');
                return;
            }

            const options = {
                key: 'rzp_live_Sx238Arvvnna5v',
                amount: amount * 100,
                currency: 'INR',
                name: 'SEVA SETTU',
                description: 'Donation to Seva Settu Foundation',
                image: 'seva-settu-logo.jpg',
                handler: function(response) {
                    document.getElementById('successOverlay').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('successOverlay').classList.remove('show');
                    }, 4000);
                },
                prefill: {
                    name: '',
                    email: '',
                    contact: ''
                },
                notes: {
                    purpose: 'Donation to Seva Settu Foundation'
                },
                theme: {
                    color: '#d4a853'
                },
                modal: {
                    ondismiss: function() {}
                }
            };

            const rzp = new Razorpay(options);
            rzp.on('payment.failed', function(response) {
                alert('Payment Failed: ' + response.error.description);
            });
            rzp.open();
        }

        // Add shake keyframe
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
